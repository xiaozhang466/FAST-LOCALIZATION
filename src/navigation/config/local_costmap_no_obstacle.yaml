# ============================================================================
# 局部代价地图插件配置文件
# 定义局部代价地图的图层插件及其加载顺序
# ============================================================================

local_costmap:
  static_map: false                # 不使用静态地图，依赖实时传感器数据
  rolling_window: true             # 使用滚动窗口，地图中心跟随机器人移动
  track_unknown_space: false       # 不跟踪未知区域，未观测区域视为自由空间
  
  # 图层插件列表 (按顺序叠加)
  # 仅保留膨胀层，暂不使用局部障碍层（不避障）
  plugins:
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
