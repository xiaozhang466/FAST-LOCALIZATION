# ============================================================================
# move_base 核心参数配置文件
# 包含规划器选择、频率设置、DWA 局部规划器详细参数
# ============================================================================

# ============================ 规划器选择 ============================
base_global_planner: navfn/NavfnROS              # 全局规划器：NavFn (基于 Dijkstra/A* 算法)
base_local_planner: dwa_local_planner/DWAPlannerROS  # 局部规划器：DWA (动态窗口法)

# ============================ 频率与超时设置 ============================
planner_frequency: 1.0           # 全局规划频率 (Hz)，每秒重新规划一次全局路径
planner_patience: 3.0            # 全局规划容忍时间 (秒)，超时则认为规划失败
controller_frequency: 10.0       # 局部控制频率 (Hz)，每秒发送 10 次速度指令
controller_patience: 3.0         # 局部控制容忍时间 (秒)，超时则认为控制失败

# ============================ 震荡检测设置 ============================
oscillation_timeout: 10.0        # 震荡超时 (秒)，机器人原地震荡超过此时间则触发恢复行为
oscillation_distance: 0.2        # 震荡距离阈值 (米)，移动距离小于此值视为震荡

# ============================ NavFn 全局规划器参数 ============================
NavfnROS:
  allow_unknown: true            # 允许规划穿过未知区域

# ============================ DWA 局部规划器参数 ============================
DWAPlannerROS:
  # ---------- 机器人运动学类型 ----------
  holonomic_robot: false         # 非全向机器人 (差速底盘)，只能前进和原地旋转
  
  # ---------- 线速度约束 (m/s) ----------
  max_vel_x: 0.8                 # 最大前进速度
  min_vel_x: 0.10                # 最小前进速度，减少停-转-停抖动
  max_vel_y: 0.0                 # 最大侧向速度 (差速底盘为 0)
  min_vel_y: 0.0                 # 最小侧向速度
  
  # ---------- 角速度约束 (rad/s) ----------
  max_vel_theta: 0.6             # 最大角速度，降低抖动
  min_vel_theta: -0.6            # 最小角速度
  
  # ---------- 加速度约束 ----------
  acc_lim_x: 1.5                 # 线加速度限制 (m/s²)
  acc_lim_y: 0.0                 # 侧向加速度限制 (差速底盘为 0)
  acc_lim_theta: 0.5             # 角加速度限制，降低抖动
  
  # ---------- 里程计话题 ----------
  odom_topic: /ranger_odom       # 使用底盘里程计，控制更平滑
  
  # ---------- 目标到达容差 ----------
  yaw_goal_tolerance: 0.4        # 朝向容差放宽，减少原地微调
  xy_goal_tolerance: 0.2         # 位置容差 (米)，20cm
  latch_xy_goal_tolerance: false # 到达位置容差后是否锁定 (false = 继续调整朝向)
  
  # ---------- 轨迹模拟参数 ----------
  sim_time: 2.0                  # 轨迹前向模拟时间 (秒)，越长越平滑
  vx_samples: 10                 # 线速度采样数量
  vtheta_samples: 20             # 角速度采样数量，增大减少角速度跳变
  
  # ---------- 轨迹评分权重 ----------
  path_distance_bias: 50.0       # 放松贴路径，减少左右摆动
  goal_distance_bias: 20.0       # 更偏向目标，走得更顺
  occdist_scale: 0.0             # 不考虑障碍物代价（仅跟随全局路径）
